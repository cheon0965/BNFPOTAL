version: '3.8'

services:
  bnf-erp-portal:
    # Dockerfile을 기반으로 로컬에서 이미지를 빌드합니다.
    build:
      context: .
      dockerfile: Dockerfile
    image: bnf-erp-portal:latest
    container_name: bnf-erp-portal
    
    # 예기치 않은 서버 재부팅/도커 데몬 재시작 시 자동으로 다시 켜지도록 설정합니다.
    restart: unless-stopped
    
    # 호스트의 포트 : 도커 컨테이너 내부 포트 연결
    # 앞쪽의 "3000"을 "8080:3000" 처럼 원하는 외부 포트로 변경하여 접속할 수 있습니다.
    ports:
      - "3000:3000"
      
    # 환경 변수로 appsettings.json의 값들을 손쉽게 덮어쓸 수 있습니다. (리눅스 환경 강제 적용)
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # 아래 Url 포트를 3000으로 고정했으므로, 위 ports 설정의 내부 포트는 항상 3000이어야 합니다.
      - App__Urls=http://0.0.0.0:3000
      
      # [주의] 아래 ConnectionStrings__DefaultConnection은 실제 리눅스 서버의 DB 연결 문자열로 변경해야 합니다!
      # 예시: Server=192.168.0.X;Database=bnf_db;Uid=root;Pwd=password;
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=bnf;Uid=root;Pwd=admin;
      
      # 컨테이너 내부에 파일이 저장될 상대경로 지정 (아래 volumes에서 마운트할 경로와 동일하게 맞춤)
      - FileStorage__UploadPath=/app/uploads

    # 리눅스 호스트 머신의 실제 폴더와 도커 컨테이너 내부 폴더를 동기화(Volume Mount)
    volumes:
      # 형식: [리눅스 호스트의 실제 절대/상대 폴더 경로] : [appsettings.json에 지정한 UploadPath]
      - ./bnf_uploads:/app/uploads
      
      # 필요하다면 appsettings.json 자체를 밖으로 빼서 관리할 수도 있습니다.
      # - ./appsettings.json:/app/appsettings.json
